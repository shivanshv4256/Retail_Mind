# pytest.ini

[pytest]
# Specify the directory or files to search for tests
testpaths = tests  # The folder where your test files are located

# Enable code coverage and specify which modules to track
addopts = --cov=your_module --cov-report=term --cov-report=html

# Fail the test run if the coverage is below 70%
cov-fail-under = 65

# Additional settings for better reporting and test behavior
maxfail = 5                # Stop after 5 test failures
disable_warnings = true     # Disable warning output during test runs